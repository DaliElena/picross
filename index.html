<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0064e0">
<meta name="description" content="Игра-головоломка: решай нонограммы и открывай пиксельные рисунки">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Нонограмма">
<title>Нонограмма</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <button class="icon-btn" aria-label="Меню" id="btnMenu">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1c1e21" stroke-width="2" stroke-linecap="round">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
    <div class="header-info">
      <div class="header-title-row">
        <span class="puzzle-title" id="headerTitle">Сердечко</span>
        <span class="badge" id="headerBadge">Средне</span>
      </div>
      <div class="mistakes-lbl" id="headerMeta">10 × 10 · ошибок: <span id="mistakesVal">0</span></div>
    </div>
    <button class="icon-btn" aria-label="Настройки" id="btnSettings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1c1e21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- PUZZLE AREA -->
  <div id="puzzleArea">
    <div id="puzzleWrap">
      <div id="colCluesWrap" style="padding-left:var(--rw)">
        <div id="colClues"></div>
      </div>
      <div id="gridRow">
        <div id="rowClues"></div>
        <div id="grid"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottomBar">
    <button class="bar-btn" id="btnHint" aria-label="Подсказка">
      <div class="bar-icon accent">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18h6"/><path d="M10 22h4"/>
          <path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V17h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/>
        </svg>
      </div>
      <span class="bar-lbl accent">Подсказка</span>
    </button>

    <button id="toolToggle" class="fill" aria-label="Инструмент">
      <div id="toolThumb"></div>
      <div class="toggle-icons">
        <div class="toggle-icon ti-fill">
          <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="3" width="12" height="12" rx="2" fill="#1c1e21"/>
          </svg>
        </div>
        <div class="toggle-icon ti-cross">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <line x1="3" y1="3" x2="15" y2="15" stroke="#1c1e21" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="15" y1="3" x2="3" y2="15" stroke="#1c1e21" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </button>

    <!-- ZOOM CONTROL -->
    <div id="zoomCtl" class="collapsed">
      <button class="zoom-btn" id="btnZoomToggle" aria-label="Масштаб" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
      </button>
      <div class="zoom-buttons">
        <button class="zoom-btn" id="btnZoomOut" aria-label="Отдалить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M5 12h14"/>
          </svg>
        </button>
        <button class="zoom-btn" id="btnZoomFit" aria-label="Вписать">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/>
          </svg>
        </button>
        <button class="zoom-btn" id="btnZoomIn" aria-label="Приблизить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<!-- COMPLETION OVERLAY -->
<div id="completionOverlay">
  <div class="ghost-grid-wrap"><div id="ghostGrid"></div></div>
  <div class="result-card">
    <div class="result-tag">Пазл решён</div>
    <div class="result-title" id="resultTitle">—</div>
    <div class="pixel-wrap"><div id="pixelGrid"></div></div>
    <div class="stars-row" id="starsRow"></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="finalTime">—</div><div class="stat-lbl">Время</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-val" id="finalMistakes">—</div><div class="stat-lbl">Ошибки</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-val" id="finalCoins">—</div><div class="stat-lbl">Монеты</div></div>
    </div>
    <button class="btn-primary" id="btnNext">Следующий пазл</button>
    <div class="btn-row">
      <button class="btn-outline" id="btnShare">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1c1e21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/>
        </svg>
        Поделиться
      </button>
      <button class="btn-ghost" id="btnReplay">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5d6c7b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
        </svg>
        Заново
      </button>
    </div>
  </div>
</div>

<!-- ======= MENU ======= -->
<div id="menuBackdrop"></div>
<div id="menuPanel" role="dialog" aria-label="Меню">

  <div class="menu-header">
    <div class="menu-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#fff"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.5)"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.5)"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5" fill="#fff"/>
      </svg>
    </div>
    <span class="menu-app-name">Нонограмма</span>
    <button class="menu-close-btn" id="btnMenuClose" aria-label="Закрыть">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
        <line x1="3" y1="3" x2="15" y2="15" stroke="#1c1e21" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="15" y1="3" x2="3" y2="15" stroke="#1c1e21" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="menu-tabs">
    <button class="menu-tab active" data-tab="puzzles">Нонограммы</button>
    <button class="menu-tab" data-tab="history">История</button>
  </div>

  <!-- PUZZLES TAB -->
  <div class="menu-tab-content active" id="tab-puzzles">
    <div class="filter-bar" id="filterBar"></div>
    <div class="puzzles-list" id="puzzlesList"></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="menu-tab-content" id="tab-history">
    <div class="history-stats-strip" id="historyStatsStrip"></div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script src="bundle.js"></script>
</body>
</html>
